server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "https://devnamdev2003.github.io"
              - "http://localhost:8080"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/user/**

        - id: expense-service
          uri: http://localhost:8082
          predicates:
            - Path=/expense/**

        - id: category-service
          uri: http://localhost:8083
          predicates:
            - Path=/category/**

springdoc:
  swagger-ui:
    urls:
      - name: User Service
        url: /user/v3/api-docs
      - name: Expense Service
        url: /expense/v3/api-docs
      - name: Category Service
        url: /category/v3/api-docs